name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          SQUARE_ACCESS_TOKEN: dummy_token_for_ci_build
          SQUARE_LOCATION_ID: dummy_location_for_ci_build
          SQUARE_ENV: sandbox
          NEXT_PUBLIC_SITE_URL: https://sacredportalwellness.com

  lighthouse:
    name: Lighthouse
    needs: lint-and-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          SQUARE_ACCESS_TOKEN: dummy_token_for_ci_build
          SQUARE_LOCATION_ID: dummy_location_for_ci_build
          SQUARE_ENV: sandbox
          NEXT_PUBLIC_SITE_URL: https://sacredportalwellness.com

      - name: Run Lighthouse CI
        run: npx @lhci/cli autorun
        env:
          SQUARE_ACCESS_TOKEN: dummy_token_for_ci_build
          SQUARE_LOCATION_ID: dummy_location_for_ci_build
          SQUARE_ENV: sandbox
          NEXT_PUBLIC_SITE_URL: https://sacredportalwellness.com

      - name: Upload Lighthouse Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: app/.lighthouseci/
          retention-days: 14

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high
